services:

  # ─── PHP Laravel App ───────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventory_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    networks:
      - inventory_net
    depends_on:
      - db

  # ─── Nginx Web Server ──────────────────────────────
  webserver:
    image: nginx:alpine
    container_name: inventory_nginx
    restart: unless-stopped
    ports:
      - "8081:80"        
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - inventory_net
    depends_on:
      - app

  # ─── MySQL Database ────────────────────────────────
  db:
    image: mysql:8.0
    container_name: inventory_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: inventory_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "33062:3306"   
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - inventory_net

networks:
  inventory_net:
    driver: bridge

volumes:
  mysql_data:
    driver: local